name: Build and Push Docker image (limedrive/develop)

on:
  push:
    branches:
      - limedrive/develop
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/^version = //;s/"//g')
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/limehubs/stream-fusion
          tags: |
            type=raw,value=limedrive
            type=raw,value=limedrive-${{ steps.get_version.outputs.APP_VERSION }}
            type=sha,format=short,prefix=limedrive-
          labels: |
            org.opencontainers.image.title=StreamFusion (limedrive)
            org.opencontainers.image.description=StreamFusion - limedrive/develop build for testing
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
